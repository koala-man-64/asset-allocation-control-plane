name: Control Plane Release
run-name: Control Plane Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      contracts_version_override:
        description: Optional exact contracts version override
        required: false
        type: string
      runtime_common_version_override:
        description: Optional exact runtime-common version override
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: control-plane-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-22.04
    env:
      TEST_MODE: "1"
      LOG_FORMAT: "TEXT"
      LOG_LEVEL: "INFO"
      AZURE_STORAGE_ACCOUNT_NAME: localdev
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
      AZURE_CONTAINER_COMMON: common
    steps:
      - name: Checkout control-plane repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-control-plane

      - name: Validate required release configuration
        env:
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          ACR_NAME: ${{ vars.ACR_NAME }}
          DISPATCH_APP_ID: ${{ vars.DISPATCH_APP_ID }}
          DISPATCH_APP_PRIVATE_KEY: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          for name in \
            AZURE_CLIENT_ID \
            AZURE_TENANT_ID \
            AZURE_SUBSCRIPTION_ID \
            RESOURCE_GROUP \
            ACR_NAME \
            DISPATCH_APP_ID \
            DISPATCH_APP_PRIVATE_KEY
          do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required release configuration: ${missing[*]}" >&2
            exit 1
          fi

      - name: Set up release Python runtime
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Resolve shared package versions
        id: shared
        shell: bash
        env:
          PIP_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          PIP_EXTRA_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}
        run: |
          set -euo pipefail
          cd asset-allocation-control-plane
          versions_file="${RUNNER_TEMP}/shared-versions.env"
          python scripts/workflows/resolve_shared_versions.py \
            --contracts-override "${{ inputs.contracts_version_override }}" \
            --runtime-common-override "${{ inputs.runtime_common_version_override }}" > "${versions_file}"
          cat "${versions_file}" >> "$GITHUB_OUTPUT"
          read_version() {
            local key="$1"
            awk -F= -v key="${key}" '$1 == key { print substr($0, length(key) + 2); found = 1 } END { exit found ? 0 : 1 }' "${versions_file}"
          }
          contracts_version="$(read_version contracts_version)"
          runtime_common_version="$(read_version runtime_common_version)"
          cat > "${RUNNER_TEMP}/shared-constraints.txt" <<EOF
          asset-allocation-contracts==${contracts_version}
          asset-allocation-runtime-common==${runtime_common_version}
          EOF
          echo "constraint_path=${RUNNER_TEMP}/shared-constraints.txt" >> "$GITHUB_OUTPUT"

      - name: Set up control-plane Python environment
        uses: ./asset-allocation-control-plane/.github/actions/setup-control-plane-python
        with:
          cache-dependency-path: |
            asset-allocation-control-plane/requirements.lock.txt
            asset-allocation-control-plane/pyproject.toml
          repo-path: asset-allocation-control-plane
          pip-constraint-path: ${{ steps.shared.outputs.constraint_path }}
        env:
          PYTHON_PACKAGE_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          PYTHON_PACKAGE_EXTRA_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Verify shared package availability
        shell: bash
        run: |
          set -euo pipefail
          download_dir="${RUNNER_TEMP}/release-package-preflight"
          rm -rf "${download_dir}"
          mkdir -p "${download_dir}"
          python -m pip download \
            --disable-pip-version-check \
            --no-cache-dir \
            --no-deps \
            --dest "${download_dir}" \
            "asset-allocation-contracts==${{ steps.shared.outputs.contracts_version }}" \
            "asset-allocation-runtime-common==${{ steps.shared.outputs.runtime_common_version }}"

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Validate release Azure prerequisites
        shell: bash
        run: |
          set -euo pipefail
          pwsh -NoProfile -File asset-allocation-control-plane/scripts/ops/validate/validate_azure_permissions.ps1 \
            -Scenario Release \
            -SubscriptionId "${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -ResourceGroup "${{ vars.RESOURCE_GROUP }}" \
            -AcrName "${{ vars.ACR_NAME }}" \
            -AzureClientId "${{ vars.AZURE_CLIENT_ID }}"

      - name: Export contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-control-plane
          python scripts/automation/export_contract_artifacts.py

      - name: Write optional Docker pip config
        id: pipconfig
        shell: bash
        run: |
          set -euo pipefail
          path="${RUNNER_TEMP}/docker-pip.conf"
          rm -f "${path}"
          if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ] || [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
            cat > "${path}" <<EOF
          [global]
          EOF
            if [ -n "${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" ]; then
              echo "index-url = ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}" >> "${path}"
            fi
            if [ -n "${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" ]; then
              echo "extra-index-url = ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}" >> "${path}"
            fi
          fi
          if [ -s "${path}" ]; then
            echo "path=${path}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push API image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-api:${GITHUB_SHA}"
          build_args=(
            --file asset-allocation-control-plane/Dockerfile.asset_allocation_api
            --tag "${image_ref}"
            --build-arg "CONTRACTS_VERSION=${{ steps.shared.outputs.contracts_version }}"
            --build-arg "RUNTIME_COMMON_VERSION=${{ steps.shared.outputs.runtime_common_version }}"
          )
          if [ -n "${{ steps.pipconfig.outputs.path }}" ]; then
            build_args+=(--secret "id=pipconfig,src=${{ steps.pipconfig.outputs.path }}")
          fi
          DOCKER_BUILDKIT=1 docker build "${build_args[@]}" .
          docker run --rm \
            -e TEST_MODE="${TEST_MODE}" \
            -e LOG_FORMAT="${LOG_FORMAT}" \
            -e LOG_LEVEL="${LOG_LEVEL}" \
            -e AZURE_STORAGE_ACCOUNT_NAME="${AZURE_STORAGE_ACCOUNT_NAME}" \
            -e AZURE_STORAGE_CONNECTION_STRING="${AZURE_STORAGE_CONNECTION_STRING}" \
            -e AZURE_CONTAINER_COMMON="${AZURE_CONTAINER_COMMON}" \
            "${image_ref}" \
            python -c "import api.service.app; import kalshi; import quiver_provider; import schwab"
          docker push "${image_ref}"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image_ref}")"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "git_sha": os.environ["GITHUB_SHA"],
              "artifact_kind": "container-image",
              "artifact_ref": os.environ["IMAGE_REF"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "version_matrix": {
                  "contracts": os.environ["CONTRACTS_VERSION"],
                  "runtime_common": os.environ["RUNTIME_COMMON_VERSION"],
                  "control_plane": os.environ["CONTROL_PLANE_VERSION"],
                  "jobs": None,
                  "ui": None,
              },
          }
          Path("artifacts/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          CONTRACTS_VERSION: ${{ steps.shared.outputs.contracts_version }}
          CONTROL_PLANE_VERSION: ${{ steps.shared.outputs.control_plane_version }}
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          RUNTIME_COMMON_VERSION: ${{ steps.shared.outputs.runtime_common_version }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: control-plane-release
          path: |
            artifacts/release-manifest.json
            asset-allocation-control-plane/api/contracts/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch released API image to control-plane prod deploy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
            --method POST \
            --input - <<EOF
          {
            "event_type": "deploy_runtime",
            "client_payload": {
              "image_digest": "${IMAGE_DIGEST}",
              "contracts_version": "${{ steps.shared.outputs.contracts_version }}",
              "reason": "release workflow ${GITHUB_RUN_ID} deploying ${GITHUB_SHA}"
            }
          }
          EOF

      - name: Dispatch control-plane release to jobs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          JOBS_REPOSITORY: ${{ vars.JOBS_REPOSITORY }}
        shell: bash
        run: |
          set -euo pipefail
          jobs_repo="${JOBS_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/asset-allocation-jobs}"
          gh api "repos/${jobs_repo}/dispatches" \
            --method POST \
            --input - <<EOF
          {
            "event_type": "control_plane_released",
            "client_payload": {
              "control_plane_sha": "${GITHUB_SHA}",
              "control_plane_version": "${{ steps.shared.outputs.control_plane_version }}",
              "image_digest": "${IMAGE_DIGEST}",
              "contracts_version": "${{ steps.shared.outputs.contracts_version }}",
              "runtime_common_version": "${{ steps.shared.outputs.runtime_common_version }}"
            }
          }
          EOF

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## Control-plane release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Contracts: \`${{ steps.shared.outputs.contracts_version }}\`"
            echo "- Runtime common: \`${{ steps.shared.outputs.runtime_common_version }}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
            echo "- Downstream dispatch: \`deploy_runtime\` to control-plane prod deploy"
            echo "- Downstream dispatch: \`control_plane_released\` to jobs"
          } >> "${GITHUB_STEP_SUMMARY}"
