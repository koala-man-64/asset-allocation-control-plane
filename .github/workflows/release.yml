name: Control Plane Release
run-name: Control Plane Release / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: control-plane-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: release
    runs-on: ubuntu-22.04
    env:
      TEST_MODE: "1"
      LOG_FORMAT: "TEXT"
      LOG_LEVEL: "INFO"
      AZURE_STORAGE_ACCOUNT_NAME: localdev
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
      AZURE_CONTAINER_COMMON: common
    steps:
      - name: Checkout control-plane repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-control-plane

      - name: Checkout contracts repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ vars.CONTRACTS_REPOSITORY || format('{0}/asset-allocation-contracts', github.repository_owner) }}
          ref: ${{ vars.CONTRACTS_REF || 'main' }}
          path: asset-allocation-contracts

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            asset-allocation-control-plane/requirements.lock.txt
            asset-allocation-control-plane/pyproject.toml
            asset-allocation-contracts/python/pyproject.toml

      - name: Install release dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r asset-allocation-control-plane/requirements.lock.txt
          python -m pip install -e asset-allocation-contracts/python
          python -m pip install -e asset-allocation-control-plane --no-deps

      - name: Export contract artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-control-plane
          python scripts/automation/export_contract_artifacts.py

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        shell: bash
        run: |
          set -euo pipefail
          az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push API image
        id: image
        shell: bash
        run: |
          set -euo pipefail
          registry="$(az acr show --name "${{ vars.ACR_NAME }}" --resource-group "${{ vars.RESOURCE_GROUP }}" --query loginServer -o tsv)"
          image_ref="${registry}/asset-allocation-api:${GITHUB_SHA}"
          docker build --file asset-allocation-control-plane/Dockerfile.asset_allocation_api --tag "${image_ref}" .
          docker push "${image_ref}"
          image_digest="$(docker inspect --format='{{index .RepoDigests 0}}' "${image_ref}")"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"
          echo "image_digest=${image_digest}" >> "$GITHUB_OUTPUT"

      - name: Write release manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          python - <<'PY'
          import json
          import subprocess
          import tomllib
          from pathlib import Path
          import os

          contracts = tomllib.loads(Path("asset-allocation-contracts/python/pyproject.toml").read_text(encoding="utf-8"))
          contracts_sha = subprocess.check_output(
              ["git", "-C", "asset-allocation-contracts", "rev-parse", "HEAD"],
              text=True,
          ).strip()
          manifest = {
              "repo": os.environ["GITHUB_REPOSITORY"],
              "git_sha": os.environ["GITHUB_SHA"],
              "artifact_kind": "container-image",
              "artifact_ref": os.environ["IMAGE_REF"],
              "image_digest": os.environ["IMAGE_DIGEST"],
              "contracts_version": contracts["project"]["version"],
              "contracts_sha": contracts_sha,
          }
          Path("artifacts/release-manifest.json").write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")
          PY
        env:
          IMAGE_REF: ${{ steps.image.outputs.image_ref }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: control-plane-release
          path: |
            artifacts/release-manifest.json
            asset-allocation-control-plane/api/contracts/*
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.DISPATCH_APP_ID }}
          private-key: ${{ secrets.DISPATCH_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch control-plane release to jobs
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
          JOBS_REPOSITORY: ${{ vars.JOBS_REPOSITORY }}
        shell: bash
        run: |
          set -euo pipefail
          jobs_repo="${JOBS_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/asset-allocation-jobs}"
          contracts_sha="$(git -C asset-allocation-contracts rev-parse HEAD)"
          contracts_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          print(tomllib.loads(Path("asset-allocation-contracts/python/pyproject.toml").read_text(encoding="utf-8"))["project"]["version"])
          PY
          )"
          gh api "repos/${jobs_repo}/dispatches" \
            --method POST \
            --input - <<EOF
          {
            "event_type": "control_plane_released",
            "client_payload": {
              "control_plane_sha": "${GITHUB_SHA}",
              "image_digest": "${IMAGE_DIGEST}",
              "contracts_version": "${contracts_version}",
              "contracts_sha": "${contracts_sha}"
            }
          }
          EOF

      - name: Write release summary
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.image_digest }}
        shell: bash
        run: |
          {
            echo "## Control-plane release"
            echo ""
            echo "- Image: \`${IMAGE_DIGEST}\`"
            echo "- Manifest: \`artifacts/release-manifest.json\`"
            echo "- Downstream dispatch: \`control_plane_released\` to jobs"
          } >> "${GITHUB_STEP_SUMMARY}"
