name: Control Plane Infra Shared Prod
run-name: Control Plane Infra / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      provision_postgres:
        description: Also provision or reconcile Postgres
        required: true
        default: false
        type: boolean
      configure_acr_pull_identity:
        description: Reapply ACR pull identity to ACA resources
        required: true
        default: true
        type: boolean
      grant_job_start_permissions:
        description: Reapply narrow Container Apps/job operator RBAC for runtime control identities
        required: true
        default: false
        type: boolean
      provision_private_runtime:
        description: Provision VNet-backed Container Apps runtime and network smoke job
        required: true
        default: false
        type: boolean
      enable_acr_private_link:
        description: Provision ACR Premium private endpoint and private DNS support
        required: true
        default: true
        type: boolean
      disable_public_data_plane_access:
        description: Disable public network access on Storage and Postgres after private connectivity is in place
        required: true
        default: false
        type: boolean
      private_runtime_verified:
        description: Confirm private smoke tests passed before disabling public data-plane access
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: control-plane-infra-prod
  cancel-in-progress: false

jobs:
  infra-shared-prod:
    name: infra-shared-prod
    runs-on: windows-2022
    environment:
      name: prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Generate infrastructure env file
        shell: pwsh
        run: |
          @"
          RESOURCE_GROUP=${{ vars.RESOURCE_GROUP }}
          AZURE_STORAGE_ACCOUNT_NAME=${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
          ACR_NAME=${{ vars.ACR_NAME }}
          ACR_PULL_IDENTITY_NAME=${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}
          API_RUNTIME_IDENTITY_NAME=${{ vars.API_RUNTIME_IDENTITY_NAME || 'asset-allocation-api-runtime-mi' }}
          JOB_CONTROL_IDENTITY_NAME=${{ vars.JOB_CONTROL_IDENTITY_NAME || 'asset-allocation-job-control-mi' }}
          ENABLE_ACR_PRIVATE_LINK=${{ inputs.enable_acr_private_link }}
          LOG_ANALYTICS_WORKSPACE_NAME=${{ vars.LOG_ANALYTICS_WORKSPACE_NAME }}
          CONTAINER_APPS_ENVIRONMENT_NAME=${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME }}
          CONTAINER_APPS_ENVIRONMENT_VNET_NAME=${{ vars.CONTAINER_APPS_ENVIRONMENT_VNET_NAME || 'asset-allocation-env-vnet' }}
          SERVICE_ACCOUNT_NAME=${{ vars.SERVICE_ACCOUNT_NAME }}
          ACA_VNET_NAME=${{ vars.ACA_VNET_NAME || 'asset-allocation-vnet-prod' }}
          ACA_VNET_ADDRESS_SPACE=${{ vars.ACA_VNET_ADDRESS_SPACE || '10.64.0.0/24' }}
          ACA_INFRA_SUBNET_NAME=${{ vars.ACA_INFRA_SUBNET_NAME || 'aca-infra-snet' }}
          ACA_INFRA_SUBNET_PREFIX=${{ vars.ACA_INFRA_SUBNET_PREFIX || '10.64.0.0/26' }}
          PRIVATE_ENDPOINT_SUBNET_NAME=${{ vars.PRIVATE_ENDPOINT_SUBNET_NAME || 'private-endpoints-snet' }}
          PRIVATE_ENDPOINT_SUBNET_PREFIX=${{ vars.PRIVATE_ENDPOINT_SUBNET_PREFIX || '10.64.0.64/27' }}
          ACA_RESERVED_SUBNET_PREFIX=${{ vars.ACA_RESERVED_SUBNET_PREFIX || '10.64.0.96/27' }}
          NAT_GATEWAY_NAME=${{ vars.NAT_GATEWAY_NAME || 'asset-allocation-nat-prod' }}
          NAT_PUBLIC_IP_NAME=${{ vars.NAT_PUBLIC_IP_NAME || 'asset-allocation-egress-ip-prod' }}
          ACA_NETWORK_SMOKE_JOB_NAME=${{ vars.ACA_NETWORK_SMOKE_JOB_NAME || 'asset-allocation-network-smoke' }}
          API_APP_VNET_NAME=${{ vars.API_APP_VNET_NAME || 'asset-allocation-api-vnet' }}
          UI_APP_VNET_NAME=${{ vars.UI_APP_VNET_NAME || 'asset-allocation-ui-vnet' }}
          UI_PUBLIC_HOSTNAME=${{ vars.UI_PUBLIC_HOSTNAME }}
          AZURE_CONTAINER_COMMON=${{ vars.AZURE_CONTAINER_COMMON }}
          AZURE_CONTAINER_BRONZE=${{ vars.AZURE_CONTAINER_BRONZE }}
          AZURE_CONTAINER_SILVER=${{ vars.AZURE_CONTAINER_SILVER }}
          AZURE_CONTAINER_GOLD=${{ vars.AZURE_CONTAINER_GOLD }}
          AZURE_CONTAINER_PLATINUM=${{ vars.AZURE_CONTAINER_PLATINUM }}
          AZURE_FOLDER_MARKET=${{ vars.AZURE_FOLDER_MARKET }}
          AZURE_FOLDER_FINANCE=${{ vars.AZURE_FOLDER_FINANCE }}
          AZURE_FOLDER_EARNINGS=${{ vars.AZURE_FOLDER_EARNINGS }}
          AZURE_FOLDER_TARGETS=${{ vars.AZURE_FOLDER_TARGETS }}
          SYSTEM_HEALTH_ARM_RESOURCE_GROUP=${{ vars.RESOURCE_GROUP }}
          POSTGRES_DSN=${{ secrets.POSTGRES_DSN }}
          "@ | Set-Content -Path infra.generated.env -Encoding utf8

      - name: Provision shared Azure substrate
        shell: pwsh
        run: |
          $provisionArgs = @{
            SubscriptionId = '${{ vars.AZURE_SUBSCRIPTION_ID }}'
            ResourceGroup = '${{ vars.RESOURCE_GROUP }}'
            Location = '${{ vars.AZURE_LOCATION || 'eastus' }}'
            StorageAccountName = '${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}'
            AcrName = '${{ vars.ACR_NAME }}'
            AcrPullIdentityName = '${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}'
            ApiRuntimeIdentityName = '${{ vars.API_RUNTIME_IDENTITY_NAME || 'asset-allocation-api-runtime-mi' }}'
            JobControlIdentityName = '${{ vars.JOB_CONTROL_IDENTITY_NAME || 'asset-allocation-job-control-mi' }}'
            LogAnalyticsWorkspaceName = '${{ vars.LOG_ANALYTICS_WORKSPACE_NAME || 'asset-allocation-law' }}'
            ContainerAppsEnvironmentName = '${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'asset-allocation-env' }}'
            VnetContainerAppsEnvironmentName = '${{ vars.CONTAINER_APPS_ENVIRONMENT_VNET_NAME || 'asset-allocation-env-vnet' }}'
            ServiceAccountName = '${{ vars.SERVICE_ACCOUNT_NAME || 'asset-allocation-sa' }}'
            VnetName = '${{ vars.ACA_VNET_NAME || 'asset-allocation-vnet-prod' }}'
            VnetAddressSpace = '${{ vars.ACA_VNET_ADDRESS_SPACE || '10.64.0.0/24' }}'
            AcaInfrastructureSubnetName = '${{ vars.ACA_INFRA_SUBNET_NAME || 'aca-infra-snet' }}'
            AcaInfrastructureSubnetPrefix = '${{ vars.ACA_INFRA_SUBNET_PREFIX || '10.64.0.0/26' }}'
            PrivateEndpointSubnetName = '${{ vars.PRIVATE_ENDPOINT_SUBNET_NAME || 'private-endpoints-snet' }}'
            PrivateEndpointSubnetPrefix = '${{ vars.PRIVATE_ENDPOINT_SUBNET_PREFIX || '10.64.0.64/27' }}'
            ReservedSubnetPrefix = '${{ vars.ACA_RESERVED_SUBNET_PREFIX || '10.64.0.96/27' }}'
            NatGatewayName = '${{ vars.NAT_GATEWAY_NAME || 'asset-allocation-nat-prod' }}'
            NatPublicIpName = '${{ vars.NAT_PUBLIC_IP_NAME || 'asset-allocation-egress-ip-prod' }}'
            NetworkSmokeJobName = '${{ vars.ACA_NETWORK_SMOKE_JOB_NAME || 'asset-allocation-network-smoke' }}'
            VnetApiAppName = '${{ vars.API_APP_VNET_NAME || 'asset-allocation-api-vnet' }}'
            VnetUiAppName = '${{ vars.UI_APP_VNET_NAME || 'asset-allocation-ui-vnet' }}'
            UiPublicHostname = '${{ vars.UI_PUBLIC_HOSTNAME }}'
            EnvFile = 'infra.generated.env'
            NonInteractive = $true
            PromptForResources = $false
          }
          if ('${{ inputs.provision_postgres }}' -eq 'true') { $provisionArgs.ProvisionPostgres = $true }
          if ('${{ inputs.configure_acr_pull_identity }}' -eq 'true') {
            $provisionArgs.GrantAcrPullToAcaResources = $true
            $provisionArgs.ConfigureAcrPullIdentityOnAcaResources = $true
          }
          if ('${{ inputs.grant_job_start_permissions }}' -eq 'true') { $provisionArgs.GrantJobStartToAcaResources = $true }
          if ('${{ inputs.provision_private_runtime }}' -ne 'true') { $provisionArgs.SkipParallelPrivateRuntime = $true }
          if ('${{ inputs.enable_acr_private_link }}' -eq 'true') { $provisionArgs.EnableAcrPrivateLink = $true }
          if ('${{ inputs.disable_public_data_plane_access }}' -eq 'true') {
            if ('${{ inputs.private_runtime_verified }}' -ne 'true') {
              throw "private_runtime_verified=true is required before disabling public Storage/Postgres data-plane access."
            }
            $provisionArgs.DisablePublicDataPlaneAccess = $true
          }
          & .\scripts\ops\provision\provision_azure.ps1 @provisionArgs

      - name: Write infrastructure summary
        shell: pwsh
        run: |
          @"
          ## Shared infra reconcile

          - Resource group: `${{ vars.RESOURCE_GROUP }}`
          - ACR: `${{ vars.ACR_NAME }}`
          - ACA environment: `${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME }}`
          - ACA VNet environment: `${{ vars.CONTAINER_APPS_ENVIRONMENT_VNET_NAME || 'asset-allocation-env-vnet' }}`
          - VNet: `${{ vars.ACA_VNET_NAME || 'asset-allocation-vnet-prod' }}`
          - API app (internal target): `${{ vars.API_APP_VNET_NAME || 'asset-allocation-api-vnet' }}`
          - UI app (parallel target): `${{ vars.UI_APP_VNET_NAME || 'asset-allocation-ui-vnet' }}`
          - NAT egress IP resource: `${{ vars.NAT_PUBLIC_IP_NAME || 'asset-allocation-egress-ip-prod' }}`
          - Network smoke job: `${{ vars.ACA_NETWORK_SMOKE_JOB_NAME || 'asset-allocation-network-smoke' }}`
          - UI public hostname: `${{ vars.UI_PUBLIC_HOSTNAME || 'not configured' }}`
          - Service account: `${{ vars.SERVICE_ACCOUNT_NAME }}`
          - Postgres reconciled: `${{ inputs.provision_postgres }}`
          - ACR pull identity reconciled: `${{ inputs.configure_acr_pull_identity }}`
          - Private runtime reconciled: `${{ inputs.provision_private_runtime }}`
          - API runtime identity: `${{ vars.API_RUNTIME_IDENTITY_NAME || 'asset-allocation-api-runtime-mi' }}`
          - Job-control identity: `${{ vars.JOB_CONTROL_IDENTITY_NAME || 'asset-allocation-job-control-mi' }}`
          - Narrow ACA operator RBAC reconciled: `${{ inputs.grant_job_start_permissions }}`
          - ACR private link reconciled: `${{ inputs.enable_acr_private_link }}`
          - Public data plane disabled: `${{ inputs.disable_public_data_plane_access }}`
          - Private runtime verified for data-plane cutover: `${{ inputs.private_runtime_verified }}`
          "@ | Add-Content -Path $env:GITHUB_STEP_SUMMARY
