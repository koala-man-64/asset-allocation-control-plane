name: Control Plane Deploy Prod
run-name: Control Plane Deploy Prod / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - deploy_runtime

permissions:
  contents: read
  id-token: write

concurrency:
  group: control-plane-prod
  cancel-in-progress: false

jobs:
  deploy-prod:
    name: deploy-prod
    runs-on: ubuntu-22.04
    environment:
      name: prod
    env:
      DISPATCH_IMAGE_DIGEST: ${{ github.event.client_payload.image_digest }}
      DISPATCH_CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
      DISPATCH_REASON: ${{ github.event.client_payload.reason }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      RELEASE_IMAGE_REPOSITORY: asset-allocation-api
      ACR_PULL_IDENTITY_NAME: ${{ vars.ACR_PULL_IDENTITY_NAME || 'asset-allocation-acr-pull-mi' }}
      API_RUNTIME_IDENTITY_NAME: ${{ vars.API_RUNTIME_IDENTITY_NAME || 'asset-allocation-api-runtime-mi' }}
      CONTAINER_APPS_ENVIRONMENT_NAME: ${{ vars.CONTAINER_APPS_ENVIRONMENT_NAME || 'asset-allocation-env' }}
      SERVICE_ACCOUNT_NAME: ${{ vars.SERVICE_ACCOUNT_NAME || 'asset-allocation-sa' }}
      API_APP_NAME: ${{ vars.API_APP_NAME || 'asset-allocation-api' }}
      API_DEPLOY_MANIFEST: ${{ vars.API_DEPLOY_MANIFEST || 'deploy/app_api.yaml' }}
      ALLOW_PUBLIC_API_INGRESS: ${{ vars.ALLOW_PUBLIC_API_INGRESS || 'false' }}
      ACA_NETWORK_SMOKE_JOB_NAME: ${{ vars.ACA_NETWORK_SMOKE_JOB_NAME || 'asset-allocation-network-smoke' }}
      AZURE_STORAGE_ACCOUNT_NAME: ${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
      AZURE_CONTAINER_BRONZE: ${{ vars.AZURE_CONTAINER_BRONZE }}
      AZURE_CONTAINER_SILVER: ${{ vars.AZURE_CONTAINER_SILVER }}
      AZURE_CONTAINER_GOLD: ${{ vars.AZURE_CONTAINER_GOLD }}
      AZURE_CONTAINER_PLATINUM: ${{ vars.AZURE_CONTAINER_PLATINUM }}
      AZURE_FOLDER_MARKET: ${{ vars.AZURE_FOLDER_MARKET }}
      AZURE_FOLDER_FINANCE: ${{ vars.AZURE_FOLDER_FINANCE }}
      AZURE_FOLDER_EARNINGS: ${{ vars.AZURE_FOLDER_EARNINGS }}
      AZURE_FOLDER_TARGETS: ${{ vars.AZURE_FOLDER_TARGETS }}
      AZURE_CONTAINER_COMMON: ${{ vars.AZURE_CONTAINER_COMMON }}
      ALPHA_VANTAGE_RATE_LIMIT_PER_MIN: ${{ vars.ALPHA_VANTAGE_RATE_LIMIT_PER_MIN }}
      ALPHA_VANTAGE_TIMEOUT_SECONDS: ${{ vars.ALPHA_VANTAGE_TIMEOUT_SECONDS }}
      ALPHA_VANTAGE_RATE_WAIT_TIMEOUT_SECONDS: ${{ vars.ALPHA_VANTAGE_RATE_WAIT_TIMEOUT_SECONDS }}
      ALPHA_VANTAGE_MAX_WORKERS: ${{ vars.ALPHA_VANTAGE_MAX_WORKERS }}
      MASSIVE_BASE_URL: ${{ vars.MASSIVE_BASE_URL }}
      MASSIVE_TIMEOUT_SECONDS: ${{ vars.MASSIVE_TIMEOUT_SECONDS }}
      ALPACA_TIMEOUT_SECONDS: ${{ vars.ALPACA_TIMEOUT_SECONDS || '10' }}
      ALPACA_MAX_RETRIES: ${{ vars.ALPACA_MAX_RETRIES || '2' }}
      ALPACA_BACKOFF_BASE_SECONDS: ${{ vars.ALPACA_BACKOFF_BASE_SECONDS || '0.25' }}
      ALPACA_REQUIRED_ROLES: ${{ vars.ALPACA_REQUIRED_ROLES }}
      ALPACA_TRADING_REQUIRED_ROLES: ${{ vars.ALPACA_TRADING_REQUIRED_ROLES || 'AssetAllocation.Alpaca.Trade' }}
      ALPACA_PAPER_TRADING_BASE_URL: ${{ vars.ALPACA_PAPER_TRADING_BASE_URL || 'https://paper-api.alpaca.markets' }}
      ALPACA_LIVE_TRADING_BASE_URL: ${{ vars.ALPACA_LIVE_TRADING_BASE_URL || 'https://api.alpaca.markets' }}
      KALSHI_ENABLED: ${{ vars.KALSHI_ENABLED || 'false' }}
      KALSHI_TRADING_ENABLED: ${{ vars.KALSHI_TRADING_ENABLED || 'false' }}
      KALSHI_TIMEOUT_SECONDS: ${{ vars.KALSHI_TIMEOUT_SECONDS || '15' }}
      KALSHI_READ_RETRY_ATTEMPTS: ${{ vars.KALSHI_READ_RETRY_ATTEMPTS || '2' }}
      KALSHI_READ_RETRY_BASE_DELAY_SECONDS: ${{ vars.KALSHI_READ_RETRY_BASE_DELAY_SECONDS || '1' }}
      KALSHI_REQUIRED_ROLES: ${{ vars.KALSHI_REQUIRED_ROLES }}
      KALSHI_TRADING_REQUIRED_ROLES: ${{ vars.KALSHI_TRADING_REQUIRED_ROLES || 'AssetAllocation.Kalshi.Trade' }}
      KALSHI_LIVE_BASE_URL: ${{ vars.KALSHI_LIVE_BASE_URL || 'https://api.elections.kalshi.com/trade-api/v2' }}
      API_ROOT_PREFIX: ${{ vars.API_ROOT_PREFIX }}
      API_PUBLIC_BASE_URL: ${{ vars.API_PUBLIC_BASE_URL }}
      ETRADE_CALLBACK_URL: ${{ vars.ETRADE_CALLBACK_URL }}
      ETRADE_ENABLED: ${{ vars.ETRADE_ENABLED || 'false' }}
      ETRADE_TRADING_ENABLED: ${{ vars.ETRADE_TRADING_ENABLED || 'false' }}
      ETRADE_TIMEOUT_SECONDS: ${{ vars.ETRADE_TIMEOUT_SECONDS || '15' }}
      ETRADE_READ_RETRY_ATTEMPTS: ${{ vars.ETRADE_READ_RETRY_ATTEMPTS || '2' }}
      ETRADE_READ_RETRY_BASE_DELAY_SECONDS: ${{ vars.ETRADE_READ_RETRY_BASE_DELAY_SECONDS || '1' }}
      ETRADE_PENDING_AUTH_TTL_SECONDS: ${{ vars.ETRADE_PENDING_AUTH_TTL_SECONDS || '300' }}
      ETRADE_PREVIEW_TTL_SECONDS: ${{ vars.ETRADE_PREVIEW_TTL_SECONDS || '180' }}
      ETRADE_IDLE_RENEW_SECONDS: ${{ vars.ETRADE_IDLE_RENEW_SECONDS || '7200' }}
      ETRADE_SESSION_EXPIRY_GUARD_SECONDS: ${{ vars.ETRADE_SESSION_EXPIRY_GUARD_SECONDS || '300' }}
      ETRADE_REQUIRED_ROLES: ${{ vars.ETRADE_REQUIRED_ROLES }}
      ETRADE_TRADING_REQUIRED_ROLES: ${{ vars.ETRADE_TRADING_REQUIRED_ROLES || 'AssetAllocation.ETrade.Trade' }}
      SCHWAB_APP_CALLBACK_URL: ${{ vars.SCHWAB_APP_CALLBACK_URL }}
      SCHWAB_ENABLED: ${{ vars.SCHWAB_ENABLED || 'false' }}
      SCHWAB_TRADING_ENABLED: ${{ vars.SCHWAB_TRADING_ENABLED || 'false' }}
      SCHWAB_TIMEOUT_SECONDS: ${{ vars.SCHWAB_TIMEOUT_SECONDS || '30' }}
      SCHWAB_REQUIRED_ROLES: ${{ vars.SCHWAB_REQUIRED_ROLES }}
      SCHWAB_TRADING_REQUIRED_ROLES: ${{ vars.SCHWAB_TRADING_REQUIRED_ROLES || 'AssetAllocation.Schwab.Trade' }}
      API_OIDC_ISSUER: ${{ vars.API_OIDC_ISSUER }}
      API_OIDC_AUDIENCE: ${{ vars.API_OIDC_AUDIENCE }}
      API_OIDC_JWKS_URL: ${{ vars.API_OIDC_JWKS_URL }}
      API_OIDC_REQUIRED_SCOPES: ${{ vars.API_OIDC_REQUIRED_SCOPES }}
      API_OIDC_REQUIRED_ROLES: ${{ vars.API_OIDC_REQUIRED_ROLES }}
      API_AUTH_SESSION_MODE: ${{ vars.API_AUTH_SESSION_MODE }}
      API_AUTH_SESSION_IDLE_TTL_SECONDS: ${{ vars.API_AUTH_SESSION_IDLE_TTL_SECONDS }}
      API_AUTH_SESSION_ABSOLUTE_TTL_SECONDS: ${{ vars.API_AUTH_SESSION_ABSOLUTE_TTL_SECONDS }}
      AI_RELAY_ENABLED: ${{ vars.AI_RELAY_ENABLED || 'false' }}
      AI_RELAY_MODEL: ${{ vars.AI_RELAY_MODEL || 'gpt-5.4-mini' }}
      AI_RELAY_REASONING_EFFORT: ${{ vars.AI_RELAY_REASONING_EFFORT || 'low' }}
      AI_RELAY_TIMEOUT_SECONDS: ${{ vars.AI_RELAY_TIMEOUT_SECONDS || '120' }}
      AI_RELAY_MAX_PROMPT_CHARS: ${{ vars.AI_RELAY_MAX_PROMPT_CHARS || '40000' }}
      AI_RELAY_MAX_FILES: ${{ vars.AI_RELAY_MAX_FILES || '4' }}
      AI_RELAY_MAX_FILE_BYTES: ${{ vars.AI_RELAY_MAX_FILE_BYTES || '5242880' }}
      AI_RELAY_MAX_TOTAL_FILE_BYTES: ${{ vars.AI_RELAY_MAX_TOTAL_FILE_BYTES || '20971520' }}
      AI_RELAY_MAX_OUTPUT_TOKENS: ${{ vars.AI_RELAY_MAX_OUTPUT_TOKENS || '4000' }}
      AI_RELAY_REQUIRED_ROLES: ${{ vars.AI_RELAY_REQUIRED_ROLES || 'AssetAllocation.AiRelay.Use' }}
      SYMBOL_ENRICHMENT_ENABLED: ${{ vars.SYMBOL_ENRICHMENT_ENABLED || 'false' }}
      SYMBOL_ENRICHMENT_MODEL: ${{ vars.SYMBOL_ENRICHMENT_MODEL }}
      SYMBOL_ENRICHMENT_CONFIDENCE_MIN: ${{ vars.SYMBOL_ENRICHMENT_CONFIDENCE_MIN }}
      SYMBOL_ENRICHMENT_MAX_SYMBOLS_PER_RUN: ${{ vars.SYMBOL_ENRICHMENT_MAX_SYMBOLS_PER_RUN }}
      SYMBOL_ENRICHMENT_ALLOWED_JOBS: ${{ vars.SYMBOL_ENRICHMENT_ALLOWED_JOBS }}
      SYSTEM_READ_REQUIRED_ROLES: ${{ vars.SYSTEM_READ_REQUIRED_ROLES || 'AssetAllocation.System.Read' }}
      SYSTEM_LOGS_READ_REQUIRED_ROLES: ${{ vars.SYSTEM_LOGS_READ_REQUIRED_ROLES || 'AssetAllocation.System.Logs.Read' }}
      SYSTEM_OPERATE_REQUIRED_ROLES: ${{ vars.SYSTEM_OPERATE_REQUIRED_ROLES || 'AssetAllocation.System.Operate' }}
      RUNTIME_CONFIG_WRITE_REQUIRED_ROLES: ${{ vars.RUNTIME_CONFIG_WRITE_REQUIRED_ROLES || 'AssetAllocation.RuntimeConfig.Write' }}
      JOB_OPERATE_REQUIRED_ROLES: ${{ vars.JOB_OPERATE_REQUIRED_ROLES || 'AssetAllocation.Jobs.Operate' }}
      PURGE_WRITE_REQUIRED_ROLES: ${{ vars.PURGE_WRITE_REQUIRED_ROLES || 'AssetAllocation.Purge.Write' }}
      API_CSP: ${{ vars.API_CSP }}
      API_CORS_ALLOW_ORIGINS: ${{ vars.API_CORS_ALLOW_ORIGINS }}
      SYSTEM_HEALTH_FRESHNESS_OVERRIDES_JSON: ${{ vars.SYSTEM_HEALTH_FRESHNESS_OVERRIDES_JSON }}
      SYSTEM_HEALTH_MARKERS_CONTAINER: ${{ vars.SYSTEM_HEALTH_MARKERS_CONTAINER }}
      SYSTEM_HEALTH_MARKERS_PREFIX: ${{ vars.SYSTEM_HEALTH_MARKERS_PREFIX }}
      UI_OIDC_CLIENT_ID: ${{ vars.UI_OIDC_CLIENT_ID }}
      UI_OIDC_AUTHORITY: ${{ vars.UI_OIDC_AUTHORITY }}
      UI_OIDC_SCOPES: ${{ vars.UI_OIDC_SCOPES }}
      UI_OIDC_REDIRECT_URI: ${{ vars.UI_OIDC_REDIRECT_URI }}
      UI_API_BASE_URL: ${{ vars.UI_API_BASE_URL }}
      UI_AUTH_PROVIDER: ${{ vars.UI_AUTH_PROVIDER }}
      LOG_LEVEL: ${{ vars.LOG_LEVEL || 'INFO' }}
      SYSTEM_HEALTH_ARM_TIMEOUT_SECONDS: ${{ vars.SYSTEM_HEALTH_ARM_TIMEOUT_SECONDS }}
      SYSTEM_HEALTH_JOB_EXECUTIONS_PER_JOB: ${{ vars.SYSTEM_HEALTH_JOB_EXECUTIONS_PER_JOB }}
      SYSTEM_HEALTH_VERBOSE_IDS: ${{ vars.SYSTEM_HEALTH_VERBOSE_IDS }}
      SYSTEM_HEALTH_RESOURCE_HEALTH_API_VERSION: ${{ vars.SYSTEM_HEALTH_RESOURCE_HEALTH_API_VERSION }}
      SYSTEM_HEALTH_MONITOR_METRICS_API_VERSION: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_API_VERSION }}
      SYSTEM_HEALTH_MONITOR_METRICS_TIMESPAN_MINUTES: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_TIMESPAN_MINUTES }}
      SYSTEM_HEALTH_MONITOR_METRICS_INTERVAL: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_INTERVAL }}
      SYSTEM_HEALTH_MONITOR_METRICS_AGGREGATION: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_AGGREGATION }}
      SYSTEM_HEALTH_MONITOR_METRICS_CONTAINERAPP_METRICS: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_CONTAINERAPP_METRICS }}
      SYSTEM_HEALTH_MONITOR_METRICS_JOB_METRICS: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_JOB_METRICS }}
      SYSTEM_HEALTH_MONITOR_METRICS_THRESHOLDS_JSON: ${{ vars.SYSTEM_HEALTH_MONITOR_METRICS_THRESHOLDS_JSON }}
      SYSTEM_HEALTH_LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.SYSTEM_HEALTH_LOG_ANALYTICS_WORKSPACE_ID }}
      SYSTEM_HEALTH_LOG_ANALYTICS_TIMEOUT_SECONDS: ${{ vars.SYSTEM_HEALTH_LOG_ANALYTICS_TIMEOUT_SECONDS }}
      SYSTEM_HEALTH_LOG_ANALYTICS_TIMESPAN_MINUTES: ${{ vars.SYSTEM_HEALTH_LOG_ANALYTICS_TIMESPAN_MINUTES }}
      SYSTEM_HEALTH_LOG_ANALYTICS_QUERIES_JSON: ${{ vars.SYSTEM_HEALTH_LOG_ANALYTICS_QUERIES_JSON }}
      REALTIME_LOG_STREAM_POLL_SECONDS: ${{ vars.REALTIME_LOG_STREAM_POLL_SECONDS }}
      REALTIME_LOG_STREAM_LOOKBACK_SECONDS: ${{ vars.REALTIME_LOG_STREAM_LOOKBACK_SECONDS }}
      REALTIME_LOG_STREAM_BATCH_SIZE: ${{ vars.REALTIME_LOG_STREAM_BATCH_SIZE }}
      AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      AI_RELAY_API_KEY: ${{ secrets.AI_RELAY_API_KEY }}
      AI_RELAY_SMOKE_BEARER_TOKEN: ${{ secrets.AI_RELAY_SMOKE_BEARER_TOKEN }}
      AI_RELAY_SMOKE_FORBIDDEN_BEARER_TOKEN: ${{ secrets.AI_RELAY_SMOKE_FORBIDDEN_BEARER_TOKEN }}
      MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
      ALPACA_PAPER_API_KEY_ID: ${{ secrets.ALPACA_PAPER_API_KEY_ID }}
      ALPACA_PAPER_SECRET_KEY: ${{ secrets.ALPACA_PAPER_SECRET_KEY }}
      ALPACA_LIVE_API_KEY_ID: ${{ secrets.ALPACA_LIVE_API_KEY_ID }}
      ALPACA_LIVE_SECRET_KEY: ${{ secrets.ALPACA_LIVE_SECRET_KEY }}
      KALSHI_LIVE_API_KEY_ID: ${{ secrets.KALSHI_LIVE_API_KEY_ID }}
      KALSHI_LIVE_PRIVATE_KEY_PEM: ${{ secrets.KALSHI_LIVE_PRIVATE_KEY_PEM }}
      ETRADE_SANDBOX_CONSUMER_KEY: ${{ secrets.ETRADE_SANDBOX_CONSUMER_KEY }}
      ETRADE_SANDBOX_CONSUMER_SECRET: ${{ secrets.ETRADE_SANDBOX_CONSUMER_SECRET }}
      ETRADE_LIVE_CONSUMER_KEY: ${{ secrets.ETRADE_LIVE_CONSUMER_KEY }}
      ETRADE_LIVE_CONSUMER_SECRET: ${{ secrets.ETRADE_LIVE_CONSUMER_SECRET }}
      SCHWAB_CLIENT_ID: ${{ secrets.SCHWAB_CLIENT_ID }}
      SCHWAB_CLIENT_SECRET: ${{ secrets.SCHWAB_CLIENT_SECRET }}
      POSTGRES_DSN: ${{ secrets.POSTGRES_DSN }}
      API_AUTH_SESSION_SECRET_KEYS: ${{ secrets.API_AUTH_SESSION_SECRET_KEYS }}
      UI_SHARED_PASSWORD_HASH: ${{ secrets.UI_SHARED_PASSWORD_HASH }}
      AZURE_STORAGE_CONNECTION_STRING_KEY_VAULT_URL: ${{ vars.AZURE_STORAGE_CONNECTION_STRING_KEY_VAULT_URL }}
      ALPHA_VANTAGE_API_KEY_KEY_VAULT_URL: ${{ vars.ALPHA_VANTAGE_API_KEY_KEY_VAULT_URL }}
      MASSIVE_API_KEY_KEY_VAULT_URL: ${{ vars.MASSIVE_API_KEY_KEY_VAULT_URL }}
      POSTGRES_DSN_KEY_VAULT_URL: ${{ vars.POSTGRES_DSN_KEY_VAULT_URL }}
      ALPACA_PAPER_API_KEY_ID_KEY_VAULT_URL: ${{ vars.ALPACA_PAPER_API_KEY_ID_KEY_VAULT_URL }}
      ALPACA_PAPER_SECRET_KEY_KEY_VAULT_URL: ${{ vars.ALPACA_PAPER_SECRET_KEY_KEY_VAULT_URL }}
      ALPACA_LIVE_API_KEY_ID_KEY_VAULT_URL: ${{ vars.ALPACA_LIVE_API_KEY_ID_KEY_VAULT_URL }}
      ALPACA_LIVE_SECRET_KEY_KEY_VAULT_URL: ${{ vars.ALPACA_LIVE_SECRET_KEY_KEY_VAULT_URL }}
      ETRADE_SANDBOX_CONSUMER_KEY_KEY_VAULT_URL: ${{ vars.ETRADE_SANDBOX_CONSUMER_KEY_KEY_VAULT_URL }}
      ETRADE_SANDBOX_CONSUMER_SECRET_KEY_VAULT_URL: ${{ vars.ETRADE_SANDBOX_CONSUMER_SECRET_KEY_VAULT_URL }}
      ETRADE_LIVE_CONSUMER_KEY_KEY_VAULT_URL: ${{ vars.ETRADE_LIVE_CONSUMER_KEY_KEY_VAULT_URL }}
      ETRADE_LIVE_CONSUMER_SECRET_KEY_VAULT_URL: ${{ vars.ETRADE_LIVE_CONSUMER_SECRET_KEY_VAULT_URL }}
      SCHWAB_CLIENT_ID_KEY_VAULT_URL: ${{ vars.SCHWAB_CLIENT_ID_KEY_VAULT_URL }}
      SCHWAB_CLIENT_SECRET_KEY_VAULT_URL: ${{ vars.SCHWAB_CLIENT_SECRET_KEY_VAULT_URL }}
      AI_RELAY_API_KEY_KEY_VAULT_URL: ${{ vars.AI_RELAY_API_KEY_KEY_VAULT_URL }}
      API_AUTH_SESSION_SECRET_KEYS_KEY_VAULT_URL: ${{ vars.API_AUTH_SESSION_SECRET_KEYS_KEY_VAULT_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure resource identifiers
        id: azure
        shell: bash
        run: |
          set -euo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt > /dev/null
          identity_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"
          identity_client_id="$(az identity show --name "${ACR_PULL_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query clientId -o tsv)"
          runtime_identity_id="$(az identity show --name "${API_RUNTIME_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query id -o tsv)"
          runtime_identity_client_id="$(az identity show --name "${API_RUNTIME_IDENTITY_NAME}" --resource-group "${RESOURCE_GROUP}" --query clientId -o tsv)"
          acr_login_server="$(az acr show --name "${ACR_NAME}" --resource-group "${RESOURCE_GROUP}" --query loginServer -o tsv)"
          env_id="/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${RESOURCE_GROUP}/providers/Microsoft.App/managedEnvironments/${CONTAINER_APPS_ENVIRONMENT_NAME}"
          previous_image="$(az containerapp show --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv 2>/dev/null || true)"
          {
            echo "identity_id=${identity_id}"
            echo "identity_client_id=${identity_client_id}"
            echo "api_runtime_identity_id=${runtime_identity_id}"
            echo "api_runtime_identity_client_id=${runtime_identity_client_id}"
            echo "acr_login_server=${acr_login_server}"
            echo "environment_id=${env_id}"
            echo "previous_image=${previous_image}"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve rollout source and image
        id: inputs
        env:
          ACR_LOGIN_SERVER: ${{ steps.azure.outputs.acr_login_server }}
        shell: bash
        run: |
          set -euo pipefail
          image_digest=""
          contracts_version=""
          reason=""
          trigger_source="${GITHUB_EVENT_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            image_digest="${DISPATCH_IMAGE_DIGEST}"
            contracts_version="${DISPATCH_CONTRACTS_VERSION}"
            reason="${DISPATCH_REASON}"
            trigger_source="repository_dispatch deploy_runtime"

            : "${image_digest:?repository_dispatch client_payload.image_digest is required}"
          else
            manifest_digest="$(
              az acr repository show-manifests \
                --name "${ACR_NAME}" \
                --repository "${RELEASE_IMAGE_REPOSITORY}" \
                --orderby time_desc \
                --top 1 \
                --query "[0].digest" \
                -o tsv \
                2> /dev/null || true
            )"
            if [ -z "${manifest_digest}" ] || [ "${manifest_digest}" = "None" ]; then
              echo "No released ${RELEASE_IMAGE_REPOSITORY} image found in ACR ${ACR_NAME}." >&2
              exit 1
            fi

            image_digest="${ACR_LOGIN_SERVER}/${RELEASE_IMAGE_REPOSITORY}@${manifest_digest}"
            reason="workflow_dispatch latest release by ${GITHUB_ACTOR} for ${GITHUB_REF} (run ${GITHUB_RUN_ID})"
            trigger_source="workflow_dispatch latest release"
          fi

          {
            echo "image_digest=${image_digest}"
            echo "contracts_version=${contracts_version}"
            echo "reason=${reason}"
            echo "trigger_source=${trigger_source}"
          } >> "$GITHUB_OUTPUT"

      - name: Render control-plane manifest
        env:
          API_IMAGE: ${{ steps.inputs.outputs.image_digest }}
          ACR_LOGIN_SERVER: ${{ steps.azure.outputs.acr_login_server }}
          ACR_PULL_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.identity_id }}
          ACR_PULL_IDENTITY_CLIENT_ID: ${{ steps.azure.outputs.identity_client_id }}
          API_RUNTIME_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.api_runtime_identity_id }}
          API_RUNTIME_IDENTITY_CLIENT_ID: ${{ steps.azure.outputs.api_runtime_identity_client_id }}
          CONTAINER_APPS_ENVIRONMENT_ID: ${{ steps.azure.outputs.environment_id }}
        shell: bash
        run: |
          set -euo pipefail
          case "${API_DEPLOY_MANIFEST}" in
            deploy/app_api.yaml|deploy/app_api_public.yaml)
              ;;
            *)
              echo "Unsupported API_DEPLOY_MANIFEST '${API_DEPLOY_MANIFEST}'. Use deploy/app_api.yaml or explicitly guarded deploy/app_api_public.yaml." >&2
              exit 1
              ;;
          esac
          if [ "${API_DEPLOY_MANIFEST}" != "deploy/app_api.yaml" ] && [ "${ALLOW_PUBLIC_API_INGRESS}" != "true" ]; then
            echo "Refusing public API ingress manifest without ALLOW_PUBLIC_API_INGRESS=true." >&2
            exit 1
          fi
          python scripts/automation/render_control_plane_manifest.py \
            --template "${API_DEPLOY_MANIFEST}" \
            --output rendered-control-plane.yaml

      - name: Apply control-plane app manifest
        env:
          ACR_PULL_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.identity_id }}
          API_RUNTIME_IDENTITY_RESOURCE_ID: ${{ steps.azure.outputs.api_runtime_identity_id }}
        shell: bash
        run: |
          set -euo pipefail
          if az containerapp show --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" > /dev/null 2>&1; then
            az containerapp identity assign \
              --name "${API_APP_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --user-assigned "${ACR_PULL_IDENTITY_RESOURCE_ID}" \
              --only-show-errors > /dev/null
            az containerapp identity assign \
              --name "${API_APP_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --user-assigned "${API_RUNTIME_IDENTITY_RESOURCE_ID}" \
              --only-show-errors > /dev/null
            az containerapp update --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-control-plane.yaml
          else
            az containerapp create --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --yaml rendered-control-plane.yaml
          fi

      - name: Verify deployed control-plane endpoints
        id: verify
        shell: bash
        run: |
          set -euo pipefail
          expect_status() {
            local expected="$1"
            shift
            local actual
            actual="$(curl -sS -o /dev/null -w '%{http_code}' --retry 12 --retry-delay 10 --retry-connrefused "$@")"
            if [ "${actual}" != "${expected}" ]; then
              echo "Expected HTTP ${expected}, got ${actual}: $*" >&2
              return 1
            fi
          }

          fqdn="$(az containerapp show --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.configuration.ingress.fqdn' -o tsv 2>/dev/null || true)"
          actual_image="$(az containerapp show --name "${API_APP_NAME}" --resource-group "${RESOURCE_GROUP}" --query 'properties.template.containers[0].image' -o tsv)"
          test "${actual_image}" = "${{ steps.inputs.outputs.image_digest }}"
          verification_mode="public-ingress"
          verification_target="https://${fqdn}"

          if [ "${API_DEPLOY_MANIFEST}" = "deploy/app_api.yaml" ]; then
            verification_mode="internal-smoke-job"
            : "${ACA_NETWORK_SMOKE_JOB_NAME:?ACA_NETWORK_SMOKE_JOB_NAME is required for internal-only verification.}"
            execution_name="$(az containerapp job start \
              --name "${ACA_NETWORK_SMOKE_JOB_NAME}" \
              --resource-group "${RESOURCE_GROUP}" \
              --env-vars "API_BASE_URL=http://${API_APP_NAME}" \
              --query name \
              -o tsv \
              --only-show-errors)"
            test -n "${execution_name}"

            status=""
            for attempt in $(seq 1 36); do
              status="$(az containerapp job execution show \
                --name "${ACA_NETWORK_SMOKE_JOB_NAME}" \
                --resource-group "${RESOURCE_GROUP}" \
                --job-execution-name "${execution_name}" \
                --query 'properties.status' \
                -o tsv \
                --only-show-errors 2>/dev/null || true)"
              case "${status}" in
                Succeeded)
                  break
                  ;;
                Failed|Canceled)
                  echo "Smoke job execution ${execution_name} ended with status ${status}." >&2
                  az containerapp job execution show \
                    --name "${ACA_NETWORK_SMOKE_JOB_NAME}" \
                    --resource-group "${RESOURCE_GROUP}" \
                    --job-execution-name "${execution_name}" \
                    -o json >&2 || true
                  exit 1
                  ;;
              esac
              echo "Smoke job execution ${execution_name} status after attempt ${attempt}: ${status:-unknown}. Retrying..." >&2
              sleep 10
            done
            test "${status}" = "Succeeded"
            verification_target="${execution_name}"
          else
            curl --fail --retry 12 --retry-delay 10 --retry-connrefused "https://${fqdn}/healthz" > /dev/null
            curl --fail --retry 12 --retry-delay 10 --retry-connrefused "https://${fqdn}/readyz" > /dev/null
            raw_api_oidc_audience="${API_OIDC_AUDIENCE}"
            api_oidc_audience="${raw_api_oidc_audience}"
            if [ "${api_oidc_audience#\"}" != "${api_oidc_audience}" ] && [ "${api_oidc_audience%\"}" != "${api_oidc_audience}" ]; then
              api_oidc_audience="${api_oidc_audience#\"}"
              api_oidc_audience="${api_oidc_audience%\"}"
            fi
            if [ "${api_oidc_audience#\'}" != "${api_oidc_audience}" ] && [ "${api_oidc_audience%\'}" != "${api_oidc_audience}" ]; then
              api_oidc_audience="${api_oidc_audience#\'}"
              api_oidc_audience="${api_oidc_audience%\'}"
            fi
            : "${api_oidc_audience:?API_OIDC_AUDIENCE is required for protected endpoint smoke tests.}"
            deploy_smoke_scope="${api_oidc_audience}"
            case "${deploy_smoke_scope}" in
              api://*)
                ;;
              *)
                deploy_smoke_scope="api://${deploy_smoke_scope}"
                ;;
            esac
            case "${deploy_smoke_scope}" in
              */.default)
                ;;
              *)
                deploy_smoke_scope="${deploy_smoke_scope}/.default"
                ;;
            esac
            if [ "${raw_api_oidc_audience}" != "${api_oidc_audience}" ]; then
              echo "Normalized quoted API_OIDC_AUDIENCE before deploy smoke token minting." >&2
            fi
            deploy_smoke_token="$(
              az account get-access-token \
                --scope "${deploy_smoke_scope}" \
                --query accessToken \
                -o tsv \
                --only-show-errors
            )"
            : "${deploy_smoke_token:?Failed to mint deploy smoke bearer token. Ensure the Azure deploy principal has the AssetAllocation.Access app role.}"
            expect_status 200 "https://${fqdn}/config.js"
            expect_status 401 "https://${fqdn}/api/openapi.json"
            expect_status 401 "https://${fqdn}/api/docs"
            expect_status 307 -H "Authorization: Bearer ${deploy_smoke_token}" "https://${fqdn}/docs"
            expect_status 307 -H "Authorization: Bearer ${deploy_smoke_token}" "https://${fqdn}/openapi.json"
            curl --fail --retry 12 --retry-delay 10 --retry-connrefused \
              -H "Authorization: Bearer ${deploy_smoke_token}" \
              "https://${fqdn}/config.js" > /dev/null
            curl --fail --retry 12 --retry-delay 10 --retry-connrefused \
              -H "Authorization: Bearer ${deploy_smoke_token}" \
              "https://${fqdn}/api/openapi.json" > /dev/null
            curl --fail --retry 12 --retry-delay 10 --retry-connrefused \
              -H "Authorization: Bearer ${deploy_smoke_token}" \
              "https://${fqdn}/api/docs" > /dev/null
            unauth_status="$(curl -sS -o /dev/null -w '%{http_code}' \
              -X POST \
              -H 'Content-Type: application/json' \
              --data '{"prompt":"deployment smoke"}' \
              "https://${fqdn}/api/ai/chat/stream")"
            test "${unauth_status}" = "401"

            if [ "${AI_RELAY_ENABLED}" = "true" ]; then
              if [ -n "${AI_RELAY_SMOKE_FORBIDDEN_BEARER_TOKEN}" ]; then
                forbidden_status="$(curl -sS -o /dev/null -w '%{http_code}' \
                  -X POST \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: Bearer ${AI_RELAY_SMOKE_FORBIDDEN_BEARER_TOKEN}" \
                  --data '{"prompt":"deployment smoke"}' \
                  "https://${fqdn}/api/ai/chat/stream")"
                test "${forbidden_status}" = "403"
              else
                echo "AI relay forbidden-role smoke skipped because AI_RELAY_SMOKE_FORBIDDEN_BEARER_TOKEN is not configured."
              fi

              if [ -n "${AI_RELAY_SMOKE_BEARER_TOKEN}" ]; then
                ai_stream="$(mktemp)"
                curl --fail --retry 6 --retry-delay 5 --retry-connrefused \
                  -X POST \
                  -H 'Content-Type: application/json' \
                  -H "Authorization: Bearer ${AI_RELAY_SMOKE_BEARER_TOKEN}" \
                  --data '{"prompt":"Return the single word ok."}' \
                  "https://${fqdn}/api/ai/chat/stream" > "${ai_stream}"
                grep -q 'event: completed' "${ai_stream}"
              else
                echo "AI relay authorized smoke skipped because AI_RELAY_SMOKE_BEARER_TOKEN is not configured."
              fi
            elif [ -n "${AI_RELAY_SMOKE_BEARER_TOKEN}" ]; then
              disabled_status="$(curl -sS -o /dev/null -w '%{http_code}' \
                -X POST \
                -H 'Content-Type: application/json' \
                -H "Authorization: Bearer ${AI_RELAY_SMOKE_BEARER_TOKEN}" \
                --data '{"prompt":"deployment smoke"}' \
                "https://${fqdn}/api/ai/chat/stream")"
              test "${disabled_status}" = "503"
            else
              echo "AI relay disabled-state smoke skipped because AI_RELAY_SMOKE_BEARER_TOKEN is not configured."
            fi
          fi

          {
            echo "fqdn=${fqdn}"
            echo "verification_mode=${verification_mode}"
            echo "verification_target=${verification_target}"
          } >> "$GITHUB_OUTPUT"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Control-plane deploy"
            echo ""
            echo "- Trigger: \`${{ steps.inputs.outputs.trigger_source }}\`"
            echo "- Target app: \`${API_APP_NAME}\`"
            echo "- Manifest: \`${API_DEPLOY_MANIFEST}\`"
            echo "- Image: \`${{ steps.inputs.outputs.image_digest }}\`"
            if [ -n "${{ steps.inputs.outputs.contracts_version }}" ]; then
              echo "- Contracts version: \`${{ steps.inputs.outputs.contracts_version }}\`"
            fi
            if [ -n "${{ steps.verify.outputs.fqdn }}" ]; then
              echo "- FQDN: https://${{ steps.verify.outputs.fqdn }}"
            fi
            echo "- Verification: \`${{ steps.verify.outputs.verification_mode }}\`"
            echo "- Verification target: \`${{ steps.verify.outputs.verification_target }}\`"
            echo "- Previous image: \`${{ steps.azure.outputs.previous_image || 'none' }}\`"
            echo "- Rollback: dispatch \`deploy_runtime\` with a known-good image digest"
            echo "- Reason: \`${{ steps.inputs.outputs.reason }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
