name: Control Plane Compatibility
run-name: Control Plane Compat / ${{ github.event_name }} / ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      dependency:
        description: Shared dependency to validate
        required: true
        default: contracts
        type: choice
        options:
          - contracts
          - runtime-common
      ref:
        description: Dependency ref or SHA to validate
        required: false
        default: main
        type: string
  repository_dispatch:
    types:
      - contracts_released
      - runtime_common_released

permissions:
  contents: write

concurrency:
  group: control-plane-compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compat:
    name: compat
    runs-on: ubuntu-22.04
    env:
      TEST_MODE: "1"
      LOG_FORMAT: "TEXT"
      LOG_LEVEL: "INFO"
      AZURE_STORAGE_ACCOUNT_NAME: localdev
      AZURE_STORAGE_CONNECTION_STRING: DefaultEndpointsProtocol=https;AccountName=test;AccountKey=key;EndpointSuffix=core.windows.net
      AZURE_CONTAINER_COMMON: common
      AZURE_CONTAINER_BRONZE: bronze
      AZURE_CONTAINER_SILVER: silver
      AZURE_CONTAINER_GOLD: gold
      AZURE_CONTAINER_PLATINUM: platinum
      AZURE_FOLDER_MARKET: market-data
      AZURE_FOLDER_FINANCE: finance-data
      AZURE_FOLDER_EARNINGS: earnings-data
      AZURE_FOLDER_TARGETS: price-target-data
      ALPHA_VANTAGE_API_KEY: test
      MASSIVE_API_KEY: test
      POSTGRES_DSN: postgresql://user:pass@localhost:5432/asset_allocation?sslmode=disable
      DISPATCH_EVENT_ACTION: ${{ github.event.action }}
      DISPATCH_CONTRACTS_SHA: ${{ github.event.client_payload.contracts_sha }}
      DISPATCH_CONTRACTS_REF: ${{ github.event.client_payload.contracts_ref }}
      DISPATCH_CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
      DISPATCH_RUNTIME_COMMON_SHA: ${{ github.event.client_payload.runtime_common_sha }}
      DISPATCH_RUNTIME_COMMON_REF: ${{ github.event.client_payload.runtime_common_ref }}
    steps:
      - name: Resolve compatibility target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          dependency="${{ inputs.dependency }}"
          ref="${{ inputs.ref }}"
          current_repo_ref="${GITHUB_REF_NAME}"

          if [ "${GITHUB_EVENT_NAME}" = "repository_dispatch" ]; then
            current_repo_ref="${{ github.event.repository.default_branch }}"
            case "${DISPATCH_EVENT_ACTION}" in
              contracts_released)
                dependency="contracts"
                ref="${DISPATCH_CONTRACTS_SHA:-${DISPATCH_CONTRACTS_REF}}"
                ;;
              runtime_common_released)
                dependency="runtime-common"
                ref="${DISPATCH_RUNTIME_COMMON_SHA:-${DISPATCH_RUNTIME_COMMON_REF}}"
                ;;
              *)
                echo "Unsupported repository_dispatch action: ${DISPATCH_EVENT_ACTION}" >&2
                exit 1
                ;;
            esac
          fi

          ref="${ref:-main}"

          case "${dependency}" in
            contracts)
              repository="${{ vars.CONTRACTS_REPOSITORY || format('{0}/asset-allocation-contracts', github.repository_owner) }}"
              checkout_path="asset-allocation-contracts"
              editable_path="asset-allocation-contracts/python"
              excluded_dependency="asset-allocation-contracts"
              pytest_args="tests/api/test_config_js_contract.py tests/api/test_internal_endpoints.py"
              summary_title="Control-plane contracts compatibility"
              summary_ref_label="Contracts ref"
              export_contract_artifacts="true"
              ;;
            runtime-common)
              repository="${{ format('{0}/asset-allocation-runtime-common', github.repository_owner) }}"
              checkout_path="asset-allocation-runtime-common"
              editable_path="asset-allocation-runtime-common/python"
              excluded_dependency="asset-allocation-runtime-common"
              pytest_args="tests/test_multirepo_dependency_contract.py tests/api/test_internal_endpoints.py"
              summary_title="Control-plane runtime-common compatibility"
              summary_ref_label="Runtime-common ref"
              export_contract_artifacts="false"
              ;;
            *)
              echo "Unsupported dependency target: ${dependency}" >&2
              exit 1
              ;;
          esac

          {
            echo "dependency=${dependency}"
            echo "ref=${ref}"
            echo "current_repo_ref=${current_repo_ref}"
            echo "repository=${repository}"
            echo "checkout_path=${checkout_path}"
            echo "editable_path=${editable_path}"
            echo "excluded_dependency=${excluded_dependency}"
            echo "pytest_args=${pytest_args}"
            echo "summary_title=${summary_title}"
            echo "summary_ref_label=${summary_ref_label}"
            echo "export_contract_artifacts=${export_contract_artifacts}"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout control-plane repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: asset-allocation-control-plane
          ref: ${{ steps.target.outputs.current_repo_ref }}
          fetch-depth: 0

      - name: Checkout shared dependency repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.target.outputs.repository }}
          ref: ${{ steps.target.outputs.ref }}
          path: ${{ steps.target.outputs.checkout_path }}

      - name: Set up control-plane Python environment
        uses: ./asset-allocation-control-plane/.github/actions/setup-control-plane-python
        with:
          repo-path: asset-allocation-control-plane
          cache-dependency-path: |
            asset-allocation-control-plane/requirements.lock.txt
            asset-allocation-control-plane/requirements-dev.lock.txt
            asset-allocation-control-plane/pyproject.toml
          install-dev-lockfile: "true"
          shared-deps-exclude: ${{ steps.target.outputs.excluded_dependency }}
          extra-editable-path: ${{ steps.target.outputs.editable_path }}
        env:
          PYTHON_PACKAGE_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_INDEX_URL }}
          PYTHON_PACKAGE_EXTRA_INDEX_URL: ${{ secrets.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

      - name: Run compatibility suite
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-control-plane
          if [ "${{ steps.target.outputs.export_contract_artifacts }}" = "true" ]; then
            python scripts/automation/export_contract_artifacts.py
          fi
          python -m pytest ${{ steps.target.outputs.pytest_args }} -q

      - name: Pin released contracts version
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.contracts_version != '' }}
        env:
          CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ["CONTRACTS_VERSION"]
          path = Path("asset-allocation-control-plane/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          updated, replacements = re.subn(
              r'asset-allocation-contracts==[^"]+',
              f"asset-allocation-contracts=={version}",
              text,
              count=1,
          )
          if replacements != 1:
              raise SystemExit("Expected exactly one asset-allocation-contracts dependency in pyproject.toml.")
          path.write_text(updated, encoding="utf-8")
          PY
          python -m pytest asset-allocation-control-plane/tests/test_multirepo_dependency_contract.py -q

      - name: Commit pinned contracts version
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.contracts_version != '' }}
        env:
          CONTRACTS_VERSION: ${{ github.event.client_payload.contracts_version }}
        shell: bash
        run: |
          set -euo pipefail
          cd asset-allocation-control-plane
          if git diff --quiet -- pyproject.toml; then
            echo "Contracts version already pinned to ${CONTRACTS_VERSION}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "chore: adopt contracts ${CONTRACTS_VERSION}"
          git push origin HEAD:${{ steps.target.outputs.current_repo_ref }}

      - name: Write compatibility summary
        shell: bash
        run: |
          {
            echo "## ${{ steps.target.outputs.summary_title }}"
            echo ""
            echo "- Dependency: \`${{ steps.target.outputs.dependency }}\`"
            echo "- ${{ steps.target.outputs.summary_ref_label }}: \`${{ steps.target.outputs.ref }}\`"
            echo "- Result: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
