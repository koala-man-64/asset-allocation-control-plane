name: Setup Control Plane Python
description: Set up Python and install control-plane dependencies for CI and release workflows.

inputs:
  repo-path:
    description: Path to the checked out control-plane repository.
    required: false
    default: .
  python-version:
    description: Python version to install.
    required: false
    default: "3.14"
  cache-dependency-path:
    description: Newline-delimited dependency files for pip cache keys.
    required: true
  install-dev-lockfile:
    description: Whether to install requirements-dev.lock.txt when present.
    required: false
    default: "false"
  shared-deps-exclude:
    description: Shared package name to exclude from the generated dependency install list.
    required: false
    default: ""
  extra-editable-path:
    description: Optional extra editable install path for additional local validation.
    required: false
    default: ""
  pip-constraint-path:
    description: Optional pip constraints file path used to force exact shared-package versions.
    required: false
    default: ""
  run-pip-check:
    description: Whether to run python -m pip check after installing dependencies.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip
        cache-dependency-path: ${{ inputs.cache-dependency-path }}

    - name: Configure optional pip indexes
      shell: bash
      run: |
        set -euo pipefail
        if [ -n "${PYTHON_PACKAGE_INDEX_URL}" ] || [ -n "${PYTHON_PACKAGE_EXTRA_INDEX_URL}" ]; then
          cat > "${RUNNER_TEMP}/pip.conf" <<EOF
        [global]
        EOF
          if [ -n "${PYTHON_PACKAGE_INDEX_URL}" ]; then
            echo "index-url = ${PYTHON_PACKAGE_INDEX_URL}" >> "${RUNNER_TEMP}/pip.conf"
          fi
          if [ -n "${PYTHON_PACKAGE_EXTRA_INDEX_URL}" ]; then
            echo "extra-index-url = ${PYTHON_PACKAGE_EXTRA_INDEX_URL}" >> "${RUNNER_TEMP}/pip.conf"
          fi
          echo "PIP_CONFIG_FILE=${RUNNER_TEMP}/pip.conf" >> "$GITHUB_ENV"
        fi
      env:
        PYTHON_PACKAGE_INDEX_URL: ${{ env.PYTHON_PACKAGE_INDEX_URL }}
        PYTHON_PACKAGE_EXTRA_INDEX_URL: ${{ env.PYTHON_PACKAGE_EXTRA_INDEX_URL }}

    - name: Configure optional pip constraints
      if: ${{ inputs.pip-constraint-path != '' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "PIP_CONSTRAINT=${{ inputs.pip-constraint-path }}" >> "$GITHUB_ENV"

    - name: Install control-plane Python dependencies
      shell: bash
      run: |
        set -euo pipefail
        repo_path="${REPO_PATH}"

        python -m pip install --upgrade pip
        python -m pip install -r "${repo_path}/requirements.lock.txt"

        if [ "${INSTALL_DEV_LOCKFILE}" = "true" ] && [ -f "${repo_path}/requirements-dev.lock.txt" ]; then
          python -m pip install -r "${repo_path}/requirements-dev.lock.txt"
        fi

        python - <<'PY' > "${repo_path}/shared-python-deps.txt"
        import os
        import re
        import tomllib
        from pathlib import Path

        DEPENDENCY_NAME_RE = re.compile(r"^([A-Za-z0-9_.-]+)")
        FIRST_PARTY_SHARED_PREFIX = "asset-allocation-"

        def normalize_name(name: str) -> str:
            return re.sub(r"[-_.]+", "-", name).lower()

        def dependency_name(dependency: str) -> str:
            match = DEPENDENCY_NAME_RE.match(dependency.strip())
            if not match:
                raise SystemExit(f"Unable to parse dependency name from pyproject entry: {dependency}")
            return normalize_name(match.group(1))

        repo_path = Path(os.environ["REPO_PATH"])
        excluded_dependency = normalize_name(os.environ.get("SHARED_DEPS_EXCLUDE", "").strip())
        pyproject = tomllib.loads((repo_path / "pyproject.toml").read_text(encoding="utf-8"))

        for dependency in pyproject["project"]["dependencies"]:
            name = dependency_name(dependency)
            if not name.startswith(FIRST_PARTY_SHARED_PREFIX):
                continue
            if excluded_dependency and name == excluded_dependency:
                continue
            print(dependency)
        PY

        if [ -s "${repo_path}/shared-python-deps.txt" ]; then
          python "${repo_path}/scripts/repo/dependency_governance.py" \
            check-shared-compat \
            --requirements "${repo_path}/shared-python-deps.txt" \
            --pyproject "${repo_path}/pyproject.toml" \
            --allow-newer-contracts
          python -m pip install --no-deps -r "${repo_path}/shared-python-deps.txt"
        fi

        if [ -n "${EXTRA_EDITABLE_PATH}" ]; then
          python -m pip install -e "${EXTRA_EDITABLE_PATH}"
        fi

        python -m pip install -e "${repo_path}" --no-deps

        if [ "${RUN_PIP_CHECK}" = "true" ]; then
          python "${repo_path}/scripts/repo/dependency_governance.py" \
            pip-check \
            --pyproject "${repo_path}/pyproject.toml"
        fi
      env:
        REPO_PATH: ${{ inputs.repo-path }}
        INSTALL_DEV_LOCKFILE: ${{ inputs.install-dev-lockfile }}
        SHARED_DEPS_EXCLUDE: ${{ inputs.shared-deps-exclude }}
        EXTRA_EDITABLE_PATH: ${{ inputs.extra-editable-path }}
        RUN_PIP_CHECK: ${{ inputs.run-pip-check }}
