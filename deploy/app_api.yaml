      - name: ALPACA_PAPER_SECRET_KEY
        secretRef: alpaca-paper-secret-key
      - name: ALPACA_LIVE_TRADING_BASE_URL
        value: "${ALPACA_LIVE_TRADING_BASE_URL}"
      - name: ALPACA_LIVE_API_KEY_ID
        secretRef: alpaca-live-api-key-id
      - name: ALPACA_LIVE_SECRET_KEY
        secretRef: alpaca-live-secret-key
      - name: KALSHI_ENABLED
