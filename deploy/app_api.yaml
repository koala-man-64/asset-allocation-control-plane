        value: "${SYMBOL_ENRICHMENT_MODEL}"
      - name: SYMBOL_ENRICHMENT_CONFIDENCE_MIN
        value: "${SYMBOL_ENRICHMENT_CONFIDENCE_MIN}"
      - name: SYMBOL_ENRICHMENT_MAX_SYMBOLS_PER_RUN
        value: "${SYMBOL_ENRICHMENT_MAX_SYMBOLS_PER_RUN}"
