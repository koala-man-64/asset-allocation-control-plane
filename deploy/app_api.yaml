      - name: API_AUTH_SESSION_IDLE_TTL_SECONDS
        value: "${API_AUTH_SESSION_IDLE_TTL_SECONDS}"
      - name: API_AUTH_SESSION_ABSOLUTE_TTL_SECONDS
        value: "${API_AUTH_SESSION_ABSOLUTE_TTL_SECONDS}"
      - name: API_AUTH_SESSION_SECRET_KEYS
        secretRef: api-auth-session-secret-keys
      - name: AI_RELAY_ENABLED
        value: "${AI_RELAY_ENABLED}"
      - name: AI_RELAY_MODEL
        value: "${AI_RELAY_MODEL}"
      - name: AI_RELAY_REASONING_EFFORT
        value: "${AI_RELAY_REASONING_EFFORT}"
      - name: AI_RELAY_TIMEOUT_SECONDS
