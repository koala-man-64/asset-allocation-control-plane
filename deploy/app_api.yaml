      - name: KALSHI_REQUIRED_ROLES
        value: "${KALSHI_REQUIRED_ROLES}"
      - name: KALSHI_TRADING_REQUIRED_ROLES
        value: "${KALSHI_TRADING_REQUIRED_ROLES}"
      - name: KALSHI_DEMO_BASE_URL
        value: "${KALSHI_DEMO_BASE_URL}"
      - name: KALSHI_DEMO_API_KEY_ID
        secretRef: kalshi-demo-api-key-id
      - name: KALSHI_DEMO_PRIVATE_KEY_PEM
