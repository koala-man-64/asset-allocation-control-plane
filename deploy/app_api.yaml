      - name: REALTIME_LOG_STREAM_BATCH_SIZE
        value: "${REALTIME_LOG_STREAM_BATCH_SIZE}"
      resources:
        cpu: 1.5
        memory: 3.0Gi
      probes:
      - type: Liveness
        httpGet:
          path: /healthz
          port: 8000
        initialDelaySeconds: 15
        periodSeconds: 30
        failureThreshold: 3
        timeoutSeconds: 5
      - type: Readiness
        httpGet:
          path: /readyz
          port: 8000
        initialDelaySeconds: 10
        periodSeconds: 10
        failureThreshold: 3
        timeoutSeconds: 5
      - type: Startup
        httpGet:
          path: /healthz
          port: 8000
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 30
        timeoutSeconds: 5
    scale:
      minReplicas: 1
      maxReplicas: 1
