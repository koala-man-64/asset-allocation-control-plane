location: East US
name: asset-allocation-api
type: Microsoft.App/containerApps
identity:
  type: UserAssigned
  userAssignedIdentities:
    "${ACR_PULL_IDENTITY_RESOURCE_ID}": {}
properties:
  managedEnvironmentId: ${CONTAINER_APPS_ENVIRONMENT_ID}
  configuration:
    activeRevisionsMode: Single
    ingress:
      external: false
      targetPort: 8000
      transport: auto
      allowInsecure: false
    registries:
    - server: ${ACR_LOGIN_SERVER}
      identity: "${ACR_PULL_IDENTITY_RESOURCE_ID}"
    secrets:
    - name: azure-storage-connection-string
      value: "${AZURE_STORAGE_CONNECTION_STRING}"
    - name: alpha-vantage-api-key
      value: "${ALPHA_VANTAGE_API_KEY}"
    - name: massive-api-key
      value: "${MASSIVE_API_KEY}"
    - name: backtest-pg-dsn
      value: "${POSTGRES_DSN}"
    - name: alpaca-paper-api-key-id
      value: "${ALPACA_PAPER_API_KEY_ID}"
    - name: alpaca-paper-secret-key
      value: "${ALPACA_PAPER_SECRET_KEY}"
    - name: alpaca-live-api-key-id
      value: "${ALPACA_LIVE_API_KEY_ID}"
    - name: alpaca-live-secret-key
      value: "${ALPACA_LIVE_SECRET_KEY}"
    - name: kalshi-demo-api-key-id
      value: "${KALSHI_DEMO_API_KEY_ID}"
    - name: kalshi-demo-private-key-pem
      value: "${KALSHI_DEMO_PRIVATE_KEY_PEM}"
    - name: kalshi-live-api-key-id
      value: "${KALSHI_LIVE_API_KEY_ID}"
    - name: kalshi-live-private-key-pem
      value: "${KALSHI_LIVE_PRIVATE_KEY_PEM}"
    - name: etrade-sandbox-consumer-key
      value: "${ETRADE_SANDBOX_CONSUMER_KEY}"
    - name: etrade-sandbox-consumer-secret
      value: "${ETRADE_SANDBOX_CONSUMER_SECRET}"
    - name: etrade-live-consumer-key
      value: "${ETRADE_LIVE_CONSUMER_KEY}"
    - name: etrade-live-consumer-secret
      value: "${ETRADE_LIVE_CONSUMER_SECRET}"
    - name: schwab-client-id
      value: "${SCHWAB_CLIENT_ID}"
    - name: schwab-client-secret
      value: "${SCHWAB_CLIENT_SECRET}"
    - name: ai-relay-api-key
      value: "${AI_RELAY_API_KEY}"
    - name: api-auth-session-secret-keys
      value: "${API_AUTH_SESSION_SECRET_KEYS}"
  template:
    serviceAccountName: ${SERVICE_ACCOUNT_NAME}
    containers:
    - image: ${API_IMAGE}
      imageType: ContainerImage
      name: asset-allocation-api
      env:
      - name: AZURE_STORAGE_ACCOUNT_NAME
        value: "${AZURE_STORAGE_ACCOUNT_NAME}"
      - name: AZURE_STORAGE_CONNECTION_STRING
        secretRef: azure-storage-connection-string
      - name: AZURE_CLIENT_ID
        value: "${ACR_PULL_IDENTITY_CLIENT_ID}"
      - name: AZURE_CONTAINER_BRONZE
        value: "${AZURE_CONTAINER_BRONZE}"
      - name: AZURE_CONTAINER_SILVER
        value: "${AZURE_CONTAINER_SILVER}"
      - name: AZURE_CONTAINER_GOLD
        value: "${AZURE_CONTAINER_GOLD}"
      - name: AZURE_CONTAINER_PLATINUM
        value: "${AZURE_CONTAINER_PLATINUM}"
      - name: AZURE_FOLDER_MARKET
        value: "${AZURE_FOLDER_MARKET}"
      - name: AZURE_FOLDER_FINANCE
        value: "${AZURE_FOLDER_FINANCE}"
      - name: AZURE_FOLDER_EARNINGS
        value: "${AZURE_FOLDER_EARNINGS}"
      - name: AZURE_FOLDER_TARGETS
        value: "${AZURE_FOLDER_TARGETS}"
      - name: AZURE_CONTAINER_COMMON
        value: "${AZURE_CONTAINER_COMMON}"
      - name: ALPHA_VANTAGE_API_KEY
        secretRef: alpha-vantage-api-key
      - name: ALPHA_VANTAGE_RATE_LIMIT_PER_MIN
        value: "${ALPHA_VANTAGE_RATE_LIMIT_PER_MIN}"
      - name: ALPHA_VANTAGE_TIMEOUT_SECONDS
        value: "${ALPHA_VANTAGE_TIMEOUT_SECONDS}"
      - name: ALPHA_VANTAGE_RATE_WAIT_TIMEOUT_SECONDS
        value: "${ALPHA_VANTAGE_RATE_WAIT_TIMEOUT_SECONDS}"
      - name: ALPHA_VANTAGE_MAX_WORKERS
        value: "${ALPHA_VANTAGE_MAX_WORKERS}"
      - name: MASSIVE_API_KEY
        secretRef: massive-api-key
      - name: MASSIVE_BASE_URL
        value: "${MASSIVE_BASE_URL}"
      - name: MASSIVE_TIMEOUT_SECONDS
        value: "${MASSIVE_TIMEOUT_SECONDS}"
      - name: ALPACA_TIMEOUT_SECONDS
        value: "${ALPACA_TIMEOUT_SECONDS}"
      - name: ALPACA_MAX_RETRIES
        value: "${ALPACA_MAX_RETRIES}"
      - name: ALPACA_BACKOFF_BASE_SECONDS
        value: "${ALPACA_BACKOFF_BASE_SECONDS}"
