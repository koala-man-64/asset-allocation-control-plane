        value: "${ETRADE_IDLE_RENEW_SECONDS}"
      - name: ETRADE_SESSION_EXPIRY_GUARD_SECONDS
        value: "${ETRADE_SESSION_EXPIRY_GUARD_SECONDS}"
      - name: ETRADE_REQUIRED_ROLES
        value: "${ETRADE_REQUIRED_ROLES}"
      - name: ETRADE_TRADING_REQUIRED_ROLES
        value: "${ETRADE_TRADING_REQUIRED_ROLES}"
      - name: ETRADE_SANDBOX_CONSUMER_KEY
        secretRef: etrade-sandbox-consumer-key
      - name: ETRADE_SANDBOX_CONSUMER_SECRET
        secretRef: etrade-sandbox-consumer-secret
      - name: ETRADE_LIVE_CONSUMER_KEY
        secretRef: etrade-live-consumer-key
      - name: ETRADE_LIVE_CONSUMER_SECRET
        secretRef: etrade-live-consumer-secret
      - name: SCHWAB_APP_CALLBACK_URL
