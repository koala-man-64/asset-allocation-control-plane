[pytest]
testpaths = tests
pythonpath = src .
norecursedirs =
    tests/alpaca
    tests/common
    tests/earnings_data
    tests/finance_data
    tests/market_data
    tests/price_target_data
    tests/technical_analysis
    tests/tasks/common
markers =
    integration: marks tests as integration tests
    slow: marks tests as slow (select with '-m "not slow"')
log_cli = false
addopts =
    -s
    --ignore=tests/tasks/test_backfill.py
    --ignore=tests/tasks/test_blacklist_job_write_policy.py
    --ignore=tests/tasks/test_bronze_observability.py
    --ignore=tests/tasks/test_bronze_symbol_policy.py
    --ignore=tests/tasks/test_gold_regime_data.py
    --ignore=tests/tasks/test_job_entrypoint.py
    --ignore=tests/tasks/test_job_entrypoint_contracts.py
    --ignore=tests/tasks/test_job_status.py
    --ignore=tests/tasks/test_job_trigger.py
    --ignore=tests/tasks/test_market_reconciliation.py
    --ignore=tests/tasks/test_postgres_gold_sync.py
    --ignore=tests/tasks/test_reconciliation_contracts.py
    --ignore=tests/tasks/test_run_manifests.py
    --ignore=tests/tasks/test_watermarks.py
    --ignore=tests/test_symbol_universe.py
log_cli_level = INFO
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
